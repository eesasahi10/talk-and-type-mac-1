name: Build Mac App

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install Libraries
      run: |
        pip install customtkinter requests pynput pyinstaller

    - name: Build Standalone Mac Executable
      run: |
        pyinstaller --noconsole --onefile receiver-mac.py

    - name: Upload Finished App Package
      uses: actions/upload-artifact@v4
      with:
        name: TalkAndType-Mac
        path: dist/
